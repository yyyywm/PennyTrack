services:
  backend:
    build: .
    image: pennytrack-backend:latest
    container_name: pennytrack-backend
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "5300"
    ports:
      - "5300:5300"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:5300/').status == 200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
