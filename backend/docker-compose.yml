services:
  backend:
    build: .
    image: pennytrack-backend:latest
    container_name: pennytrack-backend
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: "5300"
    ports:
      # 如果前置有反向代理（nginx/Caddy），可改为 "127.0.0.1:5300:5300" 防止绕过反代直连
      - "5300:5300"
    # 资源上限，防止内存泄漏拖垮宿主（非 swarm 模式下使用 mem_limit/cpus 兼容字段）
    mem_limit: 512m
    mem_reservation: 128m
    cpus: 1.0
    healthcheck:
      # 通过容器内 PORT 环境变量动态构造 URL，与 environment.PORT 解耦
      # 使用轻量 /healthz 端点，避免每 30s 多一次 SELECT version() DB 查询
      test:
        - CMD-SHELL
        - "python -c \"import os,urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:'+os.environ['PORT']+'/healthz').status==200 else 1)\""
      interval: 30s
      timeout: 5s
      retries: 3
      # 跨公网首次连接远端 MySQL + 池预热较慢，给 60s 缓冲
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
